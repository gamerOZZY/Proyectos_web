<!DOCTYPE html>
<html>
  <head>
    <title>Flexbox Pricing Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Staatliches&display=swap" rel="stylesheet">

    

  <!--
  LETRAS
  Staatliches
  DM Sans

  -->
    <style>
      /*
      Colores
      Azul => #166275
      Negro => #111E25
      Rojo => #B2263A
      */
      body {
        font-family: "DM sans", sans-serif;
        height: 100%;
        background-color: #166275;
      }

      .pricing-container{
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: space-around;
      }

    

      .plan-title{
        background-color: #B2263A;
        border-radius: 18px 18px 0 0;
        text-align: center;
        flex-basis: 30px;
        font-family: staatliches;
        font-size: 37px;
        
      }

      .plan-price{
         background-color: #B2263A;
         text-align: center;
         flex-basis: 30px;
         font-size: 21px;
      }

      .plan-features{
        background-color: #111E25;
        color: #166275;
        padding: 20px;
        font-size: 20px;
        margin: 5px;

      }

      .pricing-plan{
        background-color: #111E25;
        border-radius: 20px 20px 20px 20px;
        display: flex;
        flex-flow: column wrap;
        flex-shrink: 0;
        
        width: 300px;
         
      }

      .plan-button{
        align-self: center;
        flex-basis: 30px;
        border-radius: 13px;
        font-family: staatliches;
        font-size: 20px;
        background-color: #166275;
        margin: 13px;
      }
      
      .li{
        padding:100px;
      }

     
      @media (max-width: 1000px) {
        .pricing-container{
          flex-direction: column;
          
        }

        .pricing-plan{
          width: 50%;
        }

        .plan-button{
          width: 40%;
        }

      }
    </style>
  </head>

  <body>
    <div class="pricing-container">

      <div class="pricing-plan">
        <div class="plan-title">Basic</div>
        <div class="plan-price">$9.99/month</div>
        <ul class="plan-features">
          <li>✅ 10GB Storage</li>
          <li>✅ 1 User</li>
          <li>🚫 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>

      <div class="pricing-plan">
        <div class="plan-title">Standard</div>
        <div class="plan-price">$19.99/month</div>
        <ul class="plan-features">
          <li>✅ 50GB Storage</li>
          <li>✅ 5 Users</li>
          <li>✅ Phone &amp; Email Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>

      <div class="pricing-plan">
        <div class="plan-title">Premium</div>
        <div class="plan-price">$49.99/month</div>
        <ul class="plan-features">
          <li>✅ 100GB Storage</li>
          <li>✅ 10 Users</li>
          <li>✅ 24/7 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>


    </div>
  </body>
</html>
